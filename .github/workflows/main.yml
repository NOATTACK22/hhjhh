name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Buildozer için hazır ve çalışan resmi Action
      - name: Buildozer Action
        uses: GearSnd/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Supreme-Terminal-V16
          path: bin/*.apk
